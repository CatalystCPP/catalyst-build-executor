common:
  meta:
    min_ver: 1.1.0
  manifest:
    name: cbe
    type: BINARY
    version: 0.1.0
    description: The Catalyst Build Executor
    provides: cbe
    tooling:
      CC: clang
      CXX: clang++
      CCFLAGS: ""
      CXXFLAGS: --std=c++23 -Wall -Wextra -O3
    dirs:
      include:
        - include
      source:
        - src
      build: build
  dependencies:
    - name: reproc
      source: vcpkg
      triplet: x64-linux
      version: latest
    - name: nlohmann-json
      source: vcpkg
      triplet: x64-linux
      version: latest
      linkage: interface
  hooks:
    post-generate:
      - command: "command -v doxygen"
      - command: "doxygen"
  features:
    - binary: true
    - profiling: false
    - logging: false
    - estimates:
        default: false
        files: ["src/work_estimate.cpp", "include/cbe/work_estimate.hpp"]
test:
  manifest:
    dirs:
      source:
        - tests
      build: build_tests
benchmark:
  manifest:
    name: cbe_benchmark
    provides: cbe_benchmark
    description: CBE with Benchmarking Flags Enabled
    tooling:
      CXXFLAGS: --std=c++23 -Wall -Wextra -O0 -g -fno-omit-frame-pointer
ccache:
  manifest:
    tooling:
      CC_LAUNCHER: ccache
      CXX_LAUNCHER: ccache
